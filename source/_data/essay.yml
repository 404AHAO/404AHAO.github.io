    - content: 新年快乐，咖啡/陈曼妮
      date: 2025/01/01
      from: 阿豪

    - content: 最近终于不会每天内耗了，很喜欢Tim的一句话：“如果你把视野不往长了看，往短了看、短到一个极限的感觉”，例如：再过几分钟我可以跑去吃自己特别想吃到的东西，开车一个多小时后就可以见到许久不见或者很想见到的人或物，把到未来的期待压缩到一天之内甚至几个小时之内，不在去想太久之后的东西，感觉每天多了很多期待跟动力，最好玩的是朋友说叫我赶紧练琴，到时候我俩去大理找回场子，哈哈哈哈
      date: 2024/10/15
      from: 阿豪

    - content: 不知道什么时候开始，好像每天都会自我内耗，以前热爱的事情渐渐没什么热情继续进行下去，偶尔三分钟热度，经常偶尔~
      date: 2024/07/23
      from: 阿豪

    - content: 更新一下最近日常的动态照片😝
